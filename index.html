<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Восстановление речи после инсульта</title>
<style>
  :root { --bg-start: #1a3c34; --bg-end: #0f2a24; --text: #e0f0e8; --accent: #c8e6c9; --button-start: #b71c1c; --button-end: #d32f2f; --green: #81c784; --gray: #78909c; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:linear-gradient(135deg,var(--bg-start),var(--bg-end)); color:var(--text); min-height:100vh; line-height:1.65; }
  h1 { font-size:2.85rem; font-weight:700; text-align:center; margin:0.4em 0 0.2em; color:var(--accent); letter-spacing:-0.02em; }
  h2 { font-size:2.1rem; font-weight:600; text-align:center; margin:0.6em 0 1.2em; color:var(--accent); }
  h3 { font-size:1.45rem; font-weight:600; text-align:center; margin:0.8em 0 1em; color:var(--accent); }
  .container { max-width:1180px; margin:0 auto; padding:24px 20px; text-align:center; }
  button { background:linear-gradient(90deg,var(--button-start),var(--button-end)); color:white; border:none; border-radius:16px; padding:14px 32px; font-size:1.08em; font-weight:700; margin:8px 8px; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,0.35); transition:all .25s cubic-bezier(0.4,0,0.2,1); }
  button:hover { transform:translateY(-3px); box-shadow:0 12px 28px rgba(0,0,0,0.45); }
  button:disabled { opacity:0.6; transform:none; box-shadow:0 4px 8px rgba(0,0,0,0.3); cursor:not-allowed; }
  input { padding:14px 18px; width:100%; max-width:420px; margin:12px 8px; border-radius:14px; border:1.5px solid #4a6f62; font-size:1.05em; background:#0f2a24; color:var(--text); }
  input:focus { border-color:var(--green); box-shadow:0 0 0 4px rgba(129,199,132,.25); outline:none; }
  #home,#login,#register,#dashboard,#task { display:none; flex-direction:column; align-items:center; }
  #home { display:flex; padding-top:60px; }
  .card { background:rgba(255,255,255,.11); border-radius:24px; padding:32px 28px; margin:20px 0; width:100%; max-width:760px; box-shadow:0 8px 32px rgba(0,0,0,.45); backdrop-filter:blur(16px); border:1px solid rgba(200,230,201,.18); position: relative; overflow: visible; }
  .password-wrapper { position:relative; max-width:420px; width:100%; margin:12px auto; }
  .toggle-password { position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:1.6em; cursor:pointer; user-select:none; }
  .loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,42,36,0.7); backdrop-filter: blur(8px); border-radius:24px; z-index: 10; }
  .loader .spinner-wrapper { display: flex; justify-content: center; align-items: center; height: 100%; }
  .spinner { border:5px solid #f3f3f3; border-top:5px solid #81c784; border-radius:50%; width:48px; height:48px; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .exercise-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; width: 100%; }
  .exercise-grid button { flex: 0 1 220px; }
  #statsChart { background:rgba(255,255,255,.06); border-radius:16px; margin-top:20px; }
  .error-msg { color:#ef5350; min-height:1.6em; margin:12px 0; font-weight:500; }
  .answer-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
  #task-text {
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    max-width: 100%;
    margin: 0 auto;
    text-align: left;
    padding: 0 10px;
    font-size: 1.1em;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Главная -->
  <div id="home">
    <h1>Восстановление речи</h1>
    <h3>После инсульта — шаг за шагом к уверенной речи</h3>
    <div style="margin:52px 0 28px; display:flex; flex-wrap:wrap; gap:14px; justify-content:center;">
      <button onclick="showLogin()">Войти</button>
      <button onclick="showRegister()">Регистрация</button>
      <button onclick="startAsGuest()">Начать как гость</button>
    </div>
  </div>

  <!-- Вход -->
  <div id="login">
    <h2>Вход в аккаунт</h2>
    <div class="card" style="max-width:440px;">
      <input id="loginName" placeholder="Логин" autocomplete="username">
      <div class="password-wrapper">
        <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password">
        <span class="toggle-password" id="toggleLogin">👁️</span>
      </div>
      <button onclick="loginUser()">Войти</button>
      <button onclick="backHome()">Назад</button>
      <div id="loaderLogin" class="loader"><div class="spinner-wrapper"><div class="spinner"></div></div></div>
      <p id="loginMsg" class="error-msg"></p>
    </div>
  </div>

  <!-- Регистрация (обновлённая) -->
  <div id="register">
    <h2>Создать аккаунт</h2>
    <div class="card" style="max-width:440px;">
      <input id="regName" placeholder="Придумайте логин" autocomplete="username">
      <div class="password-wrapper">
        <input id="regPass" type="password" placeholder="Придумайте пароль" autocomplete="new-password">
        <span class="toggle-password" id="toggleReg">👁️</span>
      </div>

      <div style="margin: 18px 0 10px; text-align: left; max-width: 420px; margin-left: auto; margin-right: auto;">
        <label style="display: flex; align-items: flex-start; gap: 10px; font-size: 0.96em; cursor: pointer; user-select: none; line-height: 1.4;">
          <input type="checkbox" id="agreeCheckbox" style="margin-top: 5px; accent-color: #81c784; width: 18px; height: 18px;">
          <span>
            Я согласен на обработку моих персональных данных в соответствии с 
            <a href="#" onclick="event.preventDefault(); showPrivacyPolicy();" 
               style="color: var(--accent); text-decoration: underline; cursor: pointer;">
              Политикой конфиденциальности
            </a>
          </span>
        </label>
      </div>

      <button onclick="registerUser()">Зарегистрироваться</button>
      <button onclick="backHome()">Назад</button>
      <div id="loaderReg" class="loader"><div class="spinner-wrapper"><div class="spinner"></div></div></div>
      <p id="regMsg" class="error-msg"></p>
    </div>
  </div>

  <!-- Дашборд -->
  <div id="dashboard">
    <h2>Здравствуйте, <span id="userName"></span>!</h2>
    <div class="card">
      <div style="font-size:1.35em; margin:8px 0 16px; display:flex; align-items:center; justify-content:center; gap:16px;">
        Выполнено заданий всего: <b id="tasksDone" style="font-size:2.9rem; color:#81c784;">0</b>
      </div>
    </div>
    <div class="card">
      <div class="exercise-grid">
        <button onclick="startByType('art')">Артикуляция</button>
        <button onclick="startByType('breath')">Дыхание</button>
        <button onclick="startByType('speech')">Понимание речи</button>
        <button onclick="startByType('cognitive')">Когнитивный тренинг</button>
      </div>
      <div class="action-row" style="margin-top:20px;">
        <button onclick="startByType('random')">Случайное упражнение</button>
        <button onclick="logout()">Выйти</button>
      </div>
    </div>
    <div class="card">
      <h3>Статистика за неделю</h3>
      <div class="nav-buttons">
        <button onclick="prevWeek()">← Предыдущая</button>
        <span id="weekLabel"></span>
        <button onclick="nextWeek()">Следующая →</button>
      </div>
      <canvas id="statsChart" width="720" height="320"></canvas>
    </div>
  </div>

  <!-- Задание -->
  <div id="task">
    <h2>Текущее задание</h2>
    <p id="task-text"></p>
    <div id="answerSection" style="display:none; margin:25px 0;">
      <input id="userAnswer" placeholder="Введите ответ" style="max-width:400px;">
      <div class="answer-buttons">
        <button onclick="checkAnswer()">Проверить</button>
        <button id="showAnswerBtn" onclick="revealAnswer()">Показать ответ</button>
      </div>
      <p id="checkResult" style="margin-top:12px; font-weight:600;"></p>
      <p id="correctAnswerDisplay" style="color:#81c784; display:none; margin-top:8px;"></p>
    </div>
    <div style="margin-top:32px;">
      <button id="finishButton" onclick="finishTask()">Я выполнил(а) → дальше</button>
    </div>
  </div>
</div>

<!-- Политика конфиденциальности -->
<div id="privacyPolicy" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px 10px;">
  <div class="card" style="max-width:920px; width:100%; text-align:left; margin:0 auto;">
    <button onclick="backToRegister()" 
            style="margin-bottom:25px; background:#555; padding:10px 20px; font-size:1em;">
      ← Назад к регистрации
    </button>
    
    <h2 style="text-align:center; margin-bottom:30px; color:var(--accent);">Политика конфиденциальности</h2>
    
    <div id="policyContent" style="line-height:1.75; font-size:1.03em; color:#e0f0e8;">
      <!-- Текст политики будет вставлен через JavaScript -->
    </div>
  </div>
</div>

<script>
// ====================== КОНСТАНТЫ ======================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPgpeUqLlWrcTZ2MRHIr17rL1x_U22lcEdmjDPKmhgwWX0J1QlZynrJWEr4I_kPCknLA/exec";
const el = id => document.getElementById(id);

let currentUser = null;
let currentType = "";
let currentTaskIndex = 0;
let currentWeekStart = null;
let correctAnswer = null;
let finishPending = false;

// ====================== ОСНОВНЫЕ ФУНКЦИИ ======================
function hideAll() {
  ["home", "login", "register", "dashboard", "task", "privacyPolicy"].forEach(id => {
    const elem = el(id);
    if (elem) elem.style.display = "none";
  });
}

function showPrivacyPolicy() {
  hideAll();
  const policyDiv = el("privacyPolicy");
  if (policyDiv) {
    policyDiv.style.display = "flex";
    el("policyContent").innerHTML = privacyPolicyText;
  }
}

function backToRegister() {
  hideAll();
  el("register").style.display = "flex";
}

// ====================== API ======================
async function apiCall(action, params = {}) {
  const body = new URLSearchParams({ action, ...params });
  try {
    const res = await fetch(SCRIPT_URL, { method: "POST", body });
    return await res.json();
  } catch (e) {
    return { success: false, message: "Ошибка соединения" };
  }
}

// ====================== ГЛАЗИК ======================
function setupPasswordToggle() {
  const toggles = [
    {input: "loginPass", toggle: "toggleLogin"},
    {input: "regPass", toggle: "toggleReg"}
  ];
  toggles.forEach(t => {
    const inputEl = el(t.input);
    const toggleEl = el(t.toggle);
    if (!toggleEl) return;
    toggleEl.addEventListener('click', () => {
      if (inputEl.type === 'password') {
        inputEl.type = 'text';
        toggleEl.textContent = '🙈';
      } else {
        inputEl.type = 'password';
        toggleEl.textContent = '👁️';
      }
    });
  });
}

// ====================== ЗАГРУЗКА ======================
function showLoader(id) {
  const loader = el(id);
  if (loader) loader.style.display = 'block';
}
function hideLoader(id) {
  const loader = el(id);
  if (loader) loader.style.display = 'none';
}

// ====================== РЕГИСТРАЦИЯ ======================
async function registerUser() {
  const name = el("regName").value.trim();
  const pass = el("regPass").value.trim();
  const agree = el("agreeCheckbox").checked;
  const regMsg = el("regMsg");

  regMsg.innerText = "";

  if (!name || !pass) {
    regMsg.style.color = "#ef5350";
    regMsg.innerText = "Введите логин и пароль";
    return;
  }

  if (!agree) {
    regMsg.style.color = "#ef5350";
    regMsg.innerText = "Необходимо дать согласие на обработку персональных данных";
    return;
  }

  if (pass.length < 6) {
    regMsg.style.color = "#ef5350";
    regMsg.innerText = "Пароль должен содержать минимум 6 символов";
    return;
  }

  showLoader("loaderReg");

  const result = await apiCall("register", { 
    username: name, 
    password: pass 
  });

  hideLoader("loaderReg");

  if (result.success) {
    regMsg.style.color = "#81c784";
    regMsg.innerText = "Регистрация прошла успешно! Теперь вы можете войти.";
    setTimeout(() => {
      backHome();
      // Автоматически подставляем логин в форму входа
      el("loginName").value = name;
    }, 1800);
  } else {
    regMsg.style.color = "#ef5350";
    regMsg.innerText = result.message || "Ошибка регистрации";
  }
}

// ====================== ВХОД ======================
async function loginUser() {
  const name = el("loginName").value.trim();
  const pass = el("loginPass").value.trim();   // ← важно: trim()
  const loginMsg = el("loginMsg");

  loginMsg.innerText = "";
  showLoader("loaderLogin");

  const result = await apiCall("login", { 
    username: name, 
    password: pass 
  });

  hideLoader("loaderLogin");

  if (result.success) {
    const userData = result.user || result.data || result;
    currentUser = {
      name: userData.username || userData.name || name,
      done: parseInt(userData.done) || 0,
      categoryCounts: { art:0, breath:0, speech:0, cognitive:0 },
      completionDates: Array.isArray(userData.completed) ? userData.completed :
                       (typeof userData.completed === 'string' ? JSON.parse(userData.completed) : [])
    };
    showDashboard();
  } else {
    loginMsg.style.color = "#ef5350";
    loginMsg.innerText = result.message || "Неверный логин или пароль";
  }
}

// ====================== ОСНОВНЫЕ ФУНКЦИИ ======================
function showLogin() { 
  hideAll(); 
  el("login").style.display = "flex"; 
  el("loginMsg").innerText = ""; 
}

function showRegister() { 
  hideAll(); 
  el("register").style.display = "flex"; 
  el("regMsg").innerText = ""; 
}

function backHome() { 
  hideAll(); 
  el("home").style.display = "flex"; 
}

function startAsGuest() {
  currentUser = {
    name: "Гость",
    done: 0,
    categoryCounts: { art:0, breath:0, speech:0, cognitive:0 },
    completionDates: []
  };
  showDashboard();
}

function logout() {
  if (currentUser && currentUser.name !== "Гость") saveToCloud();
  currentUser = null;
  backHome();
}

async function saveToCloud() {
  if (!currentUser || currentUser.name === "Гость") return;
  await apiCall("update", {
    username: currentUser.name,
    done: currentUser.done,
    completed: JSON.stringify(currentUser.completionDates)
  });
}

function showDashboard() {
  hideAll();
  el("dashboard").style.display = "flex";
  el("userName").innerText = currentUser.name;
  el("tasksDone").innerText = currentUser.done || 0;
  if (!currentWeekStart) currentWeekStart = getWeekStart(new Date());
  drawChart();
}

function startByType(t) {
  hideAll();
  el("task").style.display = "flex";
  finishPending = false;
  const btn = el("finishButton");
  if (btn) btn.disabled = false;
  if (t === "random") {
    const types = ["art","breath","speech","cognitive"];
    t = types[Math.floor(Math.random()*4)];
  }
  currentType = t;
  const list = tasks[t];
  currentTaskIndex = Math.floor(Math.random() * list.length);
  const taskItem = list[currentTaskIndex];
  let showAnswer = false;

  if (t === 'cognitive' || t === 'speech') {
    // taskItem – объект {text, answer}
    correctAnswer = taskItem.answer.trim();
    el("task-text").innerText = taskItem.text;
    showAnswer = true;
  } else {
    el("task-text").innerText = taskItem; // строка
    correctAnswer = null;
  }
  el("answerSection").style.display = showAnswer ? "block" : "none";
  if (showAnswer) {
    el("userAnswer").value = "";
    el("checkResult").innerText = "";
    el("correctAnswerDisplay").style.display = "none";
    el("showAnswerBtn").style.display = "inline-block";
  }
}

function checkAnswer() {
  const userInput = el("userAnswer").value.trim();
  const resultEl = el("checkResult");

  if (!correctAnswer) return;

  // Если ничего не введено
  if (userInput === "") {
    resultEl.style.color = "#ef5350";
    resultEl.innerHTML = "❌ Введите ответ перед проверкой";
    return;
  }

  const userLower = userInput.toLowerCase().trim();
  const correctLower = correctAnswer.toLowerCase().trim();

  // 1. Точное совпадение (самый лучший случай)
  if (userLower === correctLower) {
    resultEl.style.color = "#81c784";
    resultEl.innerHTML = "✅ Правильно!";
    return;
  }

  // 2. Защита от очень коротких ответов
  if (userLower.length < 3) {
    resultEl.style.color = "#ef5350";
    resultEl.innerHTML = "❌ Неправильно. Попробуйте ещё раз.";
    return;
  }

  // 3. Проверка по ключевым словам (более умная)
  // Разбиваем правильный ответ на слова и проверяем, есть ли большинство из них
  const correctWords = correctLower.split(/\s+/).filter(w => w.length > 2);
  const userWords = userLower.split(/\s+/).filter(w => w.length > 2);

  if (correctWords.length === 0) {
    resultEl.style.color = "#ef5350";
    resultEl.innerHTML = "❌ Неправильно. Попробуйте ещё раз.";
    return;
  }

  let matches = 0;
  correctWords.forEach(word => {
    if (userWords.some(uWord => uWord === word || uWord.includes(word) || word.includes(uWord))) {
      matches++;
    }
  });

  const matchPercentage = (matches / correctWords.length) * 100;

  if (matchPercentage >= 75) {   // Нужно совпадение минимум 75% важных слов
    resultEl.style.color = "#81c784";
    resultEl.innerHTML = "✅ Правильно!";
  } else {
    resultEl.style.color = "#ef5350";
    resultEl.innerHTML = "❌ Неправильно. Попробуйте ещё раз.";
  }
}

function revealAnswer() {
  const displayEl = el("correctAnswerDisplay");
  displayEl.style.display = "block";
  displayEl.innerHTML = `<strong>Правильный ответ:</strong><br>${correctAnswer}`;
}

async function finishTask() {
  if (!currentUser || finishPending) return;
  const btn = el("finishButton");
  btn.disabled = true;
  finishPending = true;
  currentUser.done = (currentUser.done || 0) + 1;
  currentUser.categoryCounts[currentType] = (currentUser.categoryCounts[currentType] || 0) + 1;
  const today = new Date().toISOString().slice(0,10);
  currentUser.completionDates.push(today);
  try {
    await saveToCloud();
  } catch (e) {}
  // finishPending сбросится при следующем startByType
  showDashboard();
}

// ====================== СТАТИСТИКА ======================
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function getWeekCounts(completionDates, weekStartStr) {
  const start = new Date(weekStartStr);
  const days = {};
  for (let i = 0; i < 7; i++) {
    const dayDate = new Date(start);
    dayDate.setDate(start.getDate() + i);
    days[dayDate.toISOString().slice(0,10)] = 0;
  }
  (completionDates || []).forEach(date => {
    if (days[date] !== undefined) days[date]++;
  });
  return Object.values(days);
}

function getWeekLabels(weekStartStr) {
  const start = new Date(weekStartStr);
  const labels = [];
  for (let i = 0; i < 7; i++) {
    const dayDate = new Date(start);
    dayDate.setDate(start.getDate() + i);
    labels.push(dayDate.toLocaleDateString('ru-RU', {day:'numeric', month:'short'}));
  }
  return labels;
}

function getWeekRangeLabel(weekStartStr) {
  const start = new Date(weekStartStr);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return `${start.toLocaleDateString('ru-RU', {day:'numeric', month:'short'})} — ${end.toLocaleDateString('ru-RU', {day:'numeric', month:'short'})}`;
}

function drawChart() {
  const canvas = el("statsChart");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const counts = getWeekCounts(currentUser ? currentUser.completionDates : [], currentWeekStart);
  const labels = getWeekLabels(currentWeekStart);
  const maxCount = Math.max(...counts, 5);
  const barWidth = 68;
  const spacing = 18;
  const chartHeight = canvas.height - 80;
  const startX = 60;
  const startY = canvas.height - 50;

  ctx.strokeStyle = "#78909c";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(startX, 30);
  ctx.lineTo(startX, startY);
  ctx.lineTo(startX + (barWidth + spacing) * 7 - spacing + 20, startY);
  ctx.stroke();

  for (let i = 0; i <= 5; i++) {
    const y = startY - (i / 5) * chartHeight;
    ctx.beginPath();
    ctx.moveTo(startX - 8, y);
    ctx.lineTo(startX + 4, y);
    ctx.stroke();
    ctx.fillStyle = "#78909c";
    ctx.font = "13px system-ui";
    ctx.textAlign = "right";
    ctx.fillText(Math.round((i / 5) * maxCount), startX - 14, y + 5);
  }

  counts.forEach((count, index) => {
    const x = startX + index * (barWidth + spacing);
    const height = (count / maxCount) * chartHeight;
    ctx.fillStyle = "#81c784";
    ctx.shadowBlur = 8;
    ctx.shadowColor = "rgba(129,199,132,0.4)";
    ctx.fillRect(x, startY - height, barWidth, height);
    ctx.shadowBlur = 0;

    ctx.fillStyle = "#e0f0e8";
    ctx.font = "600 15px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(count, x + barWidth/2, startY - height - 12);

    ctx.fillStyle = "#c8e6c9";
    ctx.font = "13px system-ui";
    ctx.fillText(labels[index], x + barWidth/2, startY + 28);
  });

  el("weekLabel").innerText = getWeekRangeLabel(currentWeekStart);
}

function prevWeek() {
  const d = new Date(currentWeekStart);
  d.setDate(d.getDate() - 7);
  currentWeekStart = d.toISOString().slice(0,10);
  drawChart();
}

function nextWeek() {
  const d = new Date(currentWeekStart);
  d.setDate(d.getDate() + 7);
  currentWeekStart = d.toISOString().slice(0,10);
  drawChart();
}

backHome();
